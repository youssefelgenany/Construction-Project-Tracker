<mat-card class="chart-card">
  <mat-card-header>
    <mat-card-title>{{ title() }}</mat-card-title>
    @if (subtitle()) {
      <mat-card-subtitle>{{ subtitle() }}</mat-card-subtitle>
    }
  </mat-card-header>
  <mat-card-content>
    <div class="chart-container">
      <ng-content />
    </div>
  </mat-card-content>
</mat-card>
