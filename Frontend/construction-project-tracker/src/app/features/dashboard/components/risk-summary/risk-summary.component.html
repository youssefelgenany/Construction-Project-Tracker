<section class="risk-summary">
  <div class="cards-grid">
    <app-stat-card label="Projects At Risk" [value]="projectsAtRiskCount()" icon="warning" accent="#c62828" />
    <app-stat-card label="Tasks At Risk" [value]="tasksAtRiskCount()" icon="assignment_late" accent="#ef6c00" />
    <app-stat-card label="Overdue Tasks" [value]="overdueTasksCount()" icon="event_busy" accent="#ad1457" />
    <app-stat-card label="Pending Reviews" [value]="pendingReviewsCount()" icon="fact_check" accent="#6a1b9a" />
  </div>

  <mat-card class="risk-table-card">
    <mat-card-header>
      <mat-card-title>Projects Requiring Attention</mat-card-title>
      <mat-card-subtitle>Current project-level risk analysis</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (projects().length === 0) {
        <p class="empty-state">No at-risk projects detected right now.</p>
      } @else {
        <div class="table-container">
          <table mat-table [dataSource]="projects()">
            <ng-container matColumnDef="project">
              <th mat-header-cell *matHeaderCellDef>Project</th>
              <td mat-cell *matCellDef="let project">{{ project.name }}</td>
            </ng-container>

            <ng-container matColumnDef="riskLevel">
              <th mat-header-cell *matHeaderCellDef>Risk Level</th>
              <td mat-cell *matCellDef="let project">
                <app-risk-chip [level]="project.riskLevel" />
              </td>
            </ng-container>

            <ng-container matColumnDef="reason">
              <th mat-header-cell *matHeaderCellDef>Reason</th>
              <td mat-cell *matCellDef="let project">{{ project.reason }}</td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
          </table>
        </div>
      }
    </mat-card-content>
  </mat-card>
</section>
